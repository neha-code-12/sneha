    <form>
      <h1>student details</h1>
      <label for="name">student name

      ><br />
      <label for="rollNumber">
        student rollNuumber
        <input type="number" name="rollNumber" id="rollNumber" />
      </label>

      <label for="male">

      </label>
      <label for="female">
        <input type="radio" name="gender" id="female" />female
      </label>
      <h4>favorit animals</h4>

        >admissiondate
